<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos DESC50</title>
  <link rel="icon" href="https://images.unsplash.com/photo-1721331762508-13fe0743499f?ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1yZWxhdGVkfDZ8fHxlbnwwfHx8fHw%3D&fm=jpg&q=60&w=3000" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Ven!! gana tu ¡DESCUENTO!</h1>
    <p id="productCount">Productos: 0</p>
  </header>

  <main>

    <section class="form-container">
      <input type="text" id="image" placeholder="https://...">
      <input type="text" id="title" placeholder="Nombre del producto">
      <input type="text" id="description" placeholder="Describa el producto">
      <input type="number" id="price" placeholder="Valor">
      <input type="text" id="coupon" placeholder="Cupon de DESC50">
      
      <button id="saveBtn">Guardar Producto</button>
    </section>

    <section id="productContainer" class="product-container"></section>

  </main>

  <script src="script.js"></script>
</body>
<footer class="footer">
  <p>Creado por Juan Pablo Zapata</p>
</footer>
</html>
